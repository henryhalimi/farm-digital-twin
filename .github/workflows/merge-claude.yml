name: Auto-merge Claude updates

on:
  push:
    branches:
      - claude-updates

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge claude-updates into main
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git checkout main
          git merge claude-updates --no-ff -m "Auto-merge Claude updates"
          git push origin main
