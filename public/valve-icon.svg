<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <circle cx="32" cy="32" r="31" fill="white" stroke="#ccc" stroke-width="1"/>
  <!-- Valve body - dark gray housing -->
  <ellipse cx="32" cy="38" rx="14" ry="10" fill="#3a3a3a"/>
  <!-- Inlet pipe union (left) -->
  <rect x="6" y="33" width="14" height="10" rx="2" fill="#4a4a4a" stroke="#333" stroke-width="0.5"/>
  <rect x="4" y="31" width="6" height="14" rx="2" fill="#555" stroke="#333" stroke-width="0.5"/>
  <!-- Outlet pipe union (right) -->
  <rect x="44" y="33" width="14" height="10" rx="2" fill="#4a4a4a" stroke="#333" stroke-width="0.5"/>
  <rect x="54" y="31" width="6" height="14" rx="2" fill="#eee" stroke="#ccc" stroke-width="0.5"/>
  <!-- Lumo actuator (olive green top) -->
  <rect x="22" y="12" width="20" height="22" rx="8" fill="#6b7a2e"/>
  <rect x="24" y="14" width="16" height="18" rx="6" fill="#7a8a34"/>
  <!-- LUMO text -->
  <text x="32" y="26" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="white" text-anchor="middle">LUMO</text>
  <!-- Wire connectors -->
  <line x1="34" y1="34" x2="38" y2="30" stroke="#888" stroke-width="0.8"/>
  <line x1="36" y1="35" x2="40" y2="31" stroke="#888" stroke-width="0.8"/>
  <!-- Center screw -->
  <circle cx="32" cy="38" r="2" fill="#555" stroke="#333" stroke-width="0.5"/>
</svg>