<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <circle cx="32" cy="32" r="31" fill="white" stroke="#ccc" stroke-width="1"/>
  <!-- Inlet pipe (left) -->
  <line x1="6" y1="36" x2="19" y2="36" stroke="#333333" stroke-width="3" stroke-linecap="round"/>
  <!-- Outlet pipe (right) -->
  <line x1="45" y1="36" x2="58" y2="36" stroke="#333333" stroke-width="3" stroke-linecap="round"/>
  <!-- Valve bowtie (two triangles meeting at center) -->
  <polygon points="19,26 32,36 19,46" fill="none" stroke="#333333" stroke-width="2" stroke-linejoin="round"/>
  <polygon points="45,26 32,36 45,46" fill="none" stroke="#333333" stroke-width="2" stroke-linejoin="round"/>
  <!-- Downward arrow above valve (pressure reducing indicator) -->
  <line x1="32" y1="10" x2="32" y2="24" stroke="#333333" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="32,26 27,20 37,20" fill="#333333"/>
  <!-- Small minus signs indicating pressure reduction -->
  <line x1="47" y1="26" x2="53" y2="26" stroke="#333333" stroke-width="2" stroke-linecap="round"/>
</svg>
